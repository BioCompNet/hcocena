name: bioc-check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Configure pak worker count
        run: |
          echo 'options(Ncpus = 2L)' >> ~/.Rprofile

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          pak-version: devel
          working-directory: .
          dependencies: '"hard"'
          extra-packages: |
            bioc::BiocCheck
            bioc::BiocStyle
            any::CALIBERrfimpute
            any::knitr
            any::mice
            any::rmarkdown
            any::testthat
            any::BiocManager
            any::rcmdcheck

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: .
          args: 'c("--as-cran", "--no-manual")'

      - name: BiocCheck
        working-directory: .
        run: |
          Rscript -e "BiocCheck::BiocCheck('.')"
